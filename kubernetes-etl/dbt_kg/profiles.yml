knowledge_graph:
  target: dev
  outputs:
    dev:
      type: postgres
      threads: 1
      host: "{{ env_var('POSTGRES_HOST', 'localhost') }}"
      port: "{{ env_var('POSTGRES_PORT', '5432') | as_number }}"
      user: "{{ env_var('POSTGRES_USER', 'kg_user') }}"
      password: "{{ env_var('POSTGRES_PASSWORD', 'kg_password') }}"
      dbname: "{{ env_var('POSTGRES_DB', 'knowledge_graph') }}"
      schema: public
